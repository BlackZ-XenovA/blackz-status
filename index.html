<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackZ • Script Status</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 10h10v30h30v10h-30v40h-10v-40h-30v-10h30z' fill='white'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #000000 0%, #0a0a0a 50%, #050505 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Black Gradient Waves Background */
        .bg-waves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-repeat: repeat-x;
            opacity: 0.8;
        }

        .wave-1 {
            background: linear-gradient(180deg, transparent 0%, rgba(30,30,30,0.4) 100%);
            animation: wave-move 20s linear infinite;
            clip-path: polygon(0 60%, 15% 55%, 30% 65%, 45% 60%, 60% 70%, 75% 65%, 90% 75%, 100% 70%, 100% 100%, 0 100%);
        }

        .wave-2 {
            background: linear-gradient(180deg, transparent 0%, rgba(15,15,15,0.6) 100%);
            animation: wave-move 15s linear infinite reverse;
            clip-path: polygon(0 70%, 10% 65%, 25% 75%, 40% 70%, 55% 80%, 70% 75%, 85% 85%, 100% 80%, 100% 100%, 0 100%);
        }

        .wave-3 {
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 100%);
            animation: wave-move 10s linear infinite;
            clip-path: polygon(0 80%, 20% 75%, 40% 85%, 60% 80%, 80% 90%, 100% 85%, 100% 100%, 0 100%);
        }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Glitch Bars */
        .glitch-bar {
            position: fixed;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            z-index: -1;
            animation: bar-glitch 8s infinite;
            pointer-events: none;
        }

        @keyframes bar-glitch {
            0%, 100% { top: 10%; transform: scaleX(0); opacity: 0; }
            5% { top: 15%; transform: scaleX(1); opacity: 0.6; }
            10% { top: 15%; transform: scaleX(0); opacity: 0; }
            40% { top: 60%; transform: scaleX(0.5); opacity: 0.4; }
            45% { top: 60%; transform: scaleX(0); opacity: 0; }
            80% { top: 85%; transform: scaleX(1); opacity: 0.5; }
            85% { top: 85%; transform: scaleX(0); opacity: 0; }
        }

        .svg-filters {
            position: absolute;
            width: 0;
            height: 0;
        }

        .mac-window {
            width: 90%;
            max-width: 850px;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transform: scale(1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
        }

        .liquid-border {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0), rgba(255,255,255,0.3), rgba(255,255,255,0));
            background-size: 300% 300%;
            animation: liquid-flow 6s ease infinite;
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes liquid-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .title-bar {
            height: 45px;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .light:hover { opacity: 0.8; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .title-text {
            flex: 1;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        .content {
            padding: 50px 40px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .crucifix {
            width: 50px;
            height: 50px;
            fill: #fff;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .glitch {
            position: relative;
        }
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #fff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-1 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #555;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(42px, 9999px, 44px, 0); transform: skew(0.5deg); }
            20% { clip: rect(83px, 9999px, 32px, 0); transform: skew(0.6deg); }
            40% { clip: rect(66px, 9999px, 89px, 0); transform: skew(0.8deg); }
            60% { clip: rect(99px, 9999px, 11px, 0); transform: skew(0.7deg); }
            80% { clip: rect(5px, 9999px, 99px, 0); transform: skew(0.9deg); }
            100% { clip: rect(88px, 9999px, 63px, 0); transform: skew(0.2deg); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.8deg); }
            20% { clip: rect(39px, 9999px, 21px, 0); transform: skew(0.1deg); }
            40% { clip: rect(8px, 9999px, 92px, 0); transform: skew(0.3deg); }
            60% { clip: rect(27px, 9999px, 84px, 0); transform: skew(0.2deg); }
            80% { clip: rect(41px, 9999px, 72px, 0); transform: skew(0.5deg); }
            100% { clip: rect(78px, 9999px, 29px, 0); transform: skew(0.4deg); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            margin-top: 10px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* Single Card (Full Width) */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 50px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.01) 50%,
                rgba(255, 255, 255, 0.05) 100%
            );
            transform: rotate(45deg) translateY(100%);
            transition: transform 0.8s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.06);
        }

        .card:hover::before {
            transform: rotate(45deg) translateY(-100%);
        }

        .card img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 26px;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: #fff;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .social-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.4s;
        }

        .social-btn:hover {
            transform: translateY(-8px) scale(1.15);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .social-btn:hover::after {
            transform: scale(2);
        }

        .social-btn svg {
            width: 28px;
            height: 28px;
            z-index: 2;
        }

        .footer {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 650px) {
            h1 { font-size: 2.5rem; }
            .content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Black Gradient Waves Background -->
    <div class="bg-waves">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>

    <!-- Glitch Bars Overlay -->
    <div class="glitch-bar" style="animation-delay: 0s;"></div>
    <div class="glitch-bar" style="animation-delay: 2.5s;"></div>
    <div class="glitch-bar" style="animation-delay: 5s;"></div>

    <!-- Main macOS Window -->
    <main class="mac-window">
        <div class="liquid-border"></div>
        
        <div class="title-bar">
            <div class="traffic-lights">
                <span class="light red"></span>
                <span class="light yellow"></span>
                <span class="light green"></span>
            </div>
            <div class="title-text">BlackZ • Script Status</div>
            <div style="width: 52px;"></div>
        </div>

        <div class="content">
            <div class="logo-container">
                <svg class="crucifix" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,2 L14,2 L14,8 L20,8 L20,12 L14,12 L14,22 L10,22 L10,12 L4,12 L4,8 L10,8 L10,2 Z" />
                </svg>
                <h1 class="glitch" data-text="BlackZ">BlackZ</h1>
            </div>
            <p class="subtitle">เว็บตรวจสถานะสคริปต์</p>

            <!-- Status Grid (Anime Story 2 Only) -->
            <div class="status-grid">
                <div class="card">
                    <img src="animestory2.png" alt="Anime Story 2 Icon" onerror="this.src='https://via.placeholder.com/110/111/fff?text=AS2'">
                    <h3>Anime Story 2</h3>
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span>ONLINE</span>
                    </div>
                </div>
            </div>

            <div class="socials">
                <a href="https://www.youtube.com/@BlackZ_Darkness" target="_blank" class="social-btn" title="YouTube">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </a>
                
                <a href="https://discord.gg/hhSxgBmQsk" target="_blank" class="social-btn" title="Discord">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                </a>
            </div>

            <div class="footer">
                Made for BlackZ • BlackZOS-UI
            </div>
        </div>
    </main>

    <script>
        const macWindow = document.querySelector('.mac-window');
        
        macWindow.addEventListener('mousemove', (e) => {
            const rect = macWindow.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const angleY = (x - centerX) / 60; 
            const angleX = (centerY - y) / 60;
            
            macWindow.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg) scale(1.01)`;
        });

        macWindow.addEventListener('mouseleave', () => {
            macWindow.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
        });
    </script>
</body>
</html>
