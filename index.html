<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackZ • Script Status</title>
  <meta name="theme-color" content="#0b0d12" />
  <style>
    :root{
      --bg: #0a0c10;
      --bg-2: #11151c;
      --card: rgba(16, 18, 26, 0.62);
      --card-2: rgba(255,255,255,0.06);
      --text: #f5f7fb;
      --muted: rgba(245,247,251,.72);
      --border: rgba(255,255,255,.10);
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --accent: #f4f7ff;
      --accent2: #dfe6ff;
      --success: #31d158;
      --danger: #ff5a5f;
    }

    [data-theme="light"]{
      --bg: #eef2f8;
      --bg-2: #ffffff;
      --card: rgba(255,255,255,0.68);
      --card-2: rgba(15, 20, 30, 0.05);
      --text: #0b1220;
      --muted: rgba(11,18,32,.70);
      --border: rgba(11,18,32,.10);
      --shadow: 0 24px 80px rgba(16,24,40,.14);
      --accent: #121826;
      --accent2: #3a4b76;
      --success: #16a34a;
      --danger: #dc2626;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.10), transparent 22%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      overflow-x:hidden;
    }

    /* Ambient wave layers */
    .bg-wrap{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }
    .wave{
      position:absolute;
      left:50%;
      top:50%;
      width:120vw;
      height:120vw;
      transform:translate(-50%,-50%);
      border-radius:50%;
      filter: blur(18px);
      opacity:.22;
      mix-blend-mode:screen;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .wave.w1{
      background:
        radial-gradient(circle at 40% 40%, rgba(255,255,255,.18), transparent 30%),
        radial-gradient(circle at 60% 60%, rgba(255,255,255,.08), transparent 34%),
        conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.18), rgba(255,255,255,.0), rgba(0,0,0,.0), rgba(255,255,255,.14));
      animation-duration: 22s;
      animation-direction: alternate-reverse;
    }
    .wave.w2{
      width:150vw;
      height:150vw;
      opacity:.14;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.22), transparent 28%),
        radial-gradient(circle at 70% 55%, rgba(255,255,255,.10), transparent 32%),
        conic-gradient(from 45deg, rgba(0,0,0,0), rgba(255,255,255,.20), rgba(0,0,0,0), rgba(255,255,255,.12), rgba(0,0,0,0));
      animation-duration: 28s;
    }
    .grain{
      position:absolute;
      inset:-50%;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 36px 36px;
      transform: rotate(9deg);
      opacity:.12;
      mask-image: radial-gradient(circle at center, black 20%, transparent 74%);
    }
    @keyframes drift{
      from{ transform:translate(-50%,-50%) scale(0.96) rotate(0deg); }
      to{ transform:translate(-50%,-50%) scale(1.06) rotate(12deg); }
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:28px 18px 40px;
    }

    .shell{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 4px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-badge{
      width:44px;
      height:44px;
      border-radius:16px;
      background: linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      display:grid;
      place-items:center;
      backdrop-filter: blur(16px);
      font-weight:800;
      letter-spacing:.04em;
    }

    .brand-text h1{
      margin:0;
      font-size:18px;
      line-height:1.15;
      letter-spacing:.02em;
    }
    .brand-text p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .theme-switch{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px;
      border-radius:18px;
      background: var(--card);
      border:1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }
    .chip{
      border:0;
      color:var(--text);
      background:transparent;
      padding:9px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:600;
      transition: transform .2s ease, background .2s ease, opacity .2s ease;
      opacity:.72;
    }
    .chip:hover{ transform: translateY(-1px); opacity:1; }
    .chip.active{
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      opacity:1;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .hero{
      margin-top:4px;
      padding:30px 22px 24px;
      border-radius:32px;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow:hidden;
      position:relative;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:auto -18% -55% -18%;
      height:72%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.20), transparent 26%),
        radial-gradient(circle at 40% 60%, rgba(255,255,255,.08), transparent 30%),
        radial-gradient(circle at 70% 40%, rgba(255,255,255,.07), transparent 28%);
      filter: blur(18px);
      opacity:.8;
      animation: floaty 10s ease-in-out infinite alternate;
    }
    @keyframes floaty{
      from{ transform:translateY(0) scale(1); }
      to{ transform:translateY(-12px) scale(1.03); }
    }

    .profile{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      text-align:center;
    }
    .avatar{
      width:132px;
      height:132px;
      border-radius:50%;
      overflow:hidden;
      border:4px solid rgba(255,255,255,.24);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
      background:#0b0d12;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      margin:0;
      font-size:clamp(30px, 5vw, 52px);
      letter-spacing:.02em;
      line-height:1;
      font-weight:900;
      background: linear-gradient(180deg, #ffffff, rgba(255,255,255,.72));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    [data-theme="light"] .name{
      background: linear-gradient(180deg, #0b1220, #3b4a66);
      -webkit-background-clip:text;
      background-clip:text;
    }

    .bio{
      max-width:720px;
      margin:0;
      font-size:15px;
      color:var(--muted);
      line-height:1.7;
    }

    .cards{
      display:grid;
      grid-template-columns: 1fr; /* ปรับให้ขยายเต็มความยาวเท่าการ์ดด้านบน */
      gap:18px;
    }
    @media (max-width: 820px){
      .topbar{ flex-direction:column; align-items:stretch; }
      .theme-switch{ justify-content:center; flex-wrap:wrap; }
    }

    .panel{
      padding:20px;
      border-radius:28px;
      background: var(--card);
      border:1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .section-title{
      margin:0 0 14px;
      font-size:16px;
      letter-spacing:.02em;
      color:var(--muted);
    }

    .script-card{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .script-head{
      display:flex;
      gap:16px;
      align-items:center;
    }

    .cover{
      width:92px;
      height:92px;
      border-radius:24px;
      overflow:hidden;
      flex:0 0 auto;
      border:1px solid var(--border);
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
      background: rgba(255,255,255,.05);
    }
    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .script-meta{
      min-width:0;
    }
    .script-meta h2{
      margin:0 0 6px;
      font-size:24px;
      line-height:1.15;
    }
    .script-meta p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .status-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px;
      border-radius:22px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid var(--border);
    }

    .status-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .dot{
      width:16px;
      height:16px;
      border-radius:999px;
      box-shadow: 0 0 0 6px rgba(255,255,255,.04);
      animation: blink 2.4s ease-in-out infinite;
      flex:0 0 auto;
    }
    .online .dot{
      background: var(--success);
      box-shadow: 0 0 24px rgba(49,209,88,.45);
    }
    .offline .dot{
      background: var(--danger);
      box-shadow: 0 0 24px rgba(255,90,95,.38);
    }
    @keyframes blink{
      0%,100%{ transform:scale(1); opacity:.92; }
      50%{ transform:scale(.76); opacity:.42; }
    }

    .status-text{
      min-width:0;
    }
    .status-text .label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:3px;
    }
    .status-text .value{
      display:block;
      font-size:18px;
      font-weight:800;
      letter-spacing:.01em;
    }
    .status-pill{
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      letter-spacing:.02em;
      white-space:nowrap;
      background: rgba(255,255,255,.07);
      border:1px solid var(--border);
    }

    .aside{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .toggle-group{
      display:grid;
      gap:12px;
    }

    .config{
      padding:14px 16px;
      border-radius:18px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid var(--border);
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }
    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .95em;
      padding:2px 6px;
      border-radius:8px;
      background: rgba(255,255,255,.09);
      color:var(--text);
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:16px 0 0; /* เพิ่ม Space ด้านบนของฟุตเตอร์เล็กน้อยเพื่อความสวยงาม */
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation-duration:0.001ms !important;
        animation-iteration-count:1 !important;
        transition-duration:0.001ms !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-wrap" aria-hidden="true">
    <div class="wave w1"></div>
    <div class="wave w2"></div>
    <div class="grain"></div>
  </div>

  <main class="page">
    <div class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="brand-badge">BZ</div>
          <div class="brand-text">
            <h1>BlackZ Script Status</h1>
            <p>เว็บตรวจสถานะสคริปต์</p>
          </div>
        </div>

        <div class="theme-switch" role="tablist" aria-label="Theme switch">
          <button class="chip" data-theme-btn="light">สว่าง</button>
          <button class="chip active" data-theme-btn="dark">มืด</button>
          <button class="chip" data-theme-btn="auto">อัตโนมัติ</button>
        </div>
      </div>

      <section class="hero">
        <div class="profile">
          <div class="avatar">
            <img src="https://cdn.discordapp.com/attachments/1463275696507064332/1513317309182115962/4.jpg?ex=6a274a12&is=6a25f892&hm=97f60a301c7927d570968e333803d79f7fc44c4d462f4c1e6c75b7fdb8cce900&" alt="BlackZ profile picture">
          </div>
          <h1 class="name">BlackZ</h1>
          <p class="bio">
          </p>
        </div>
      </section>

      <div class="cards">
        <section class="panel script-card">
          <h2 class="section-title">Script Status</h2>

          <div class="script-head">
            <div class="cover">
              <img src="https://cdn.discordapp.com/attachments/1463275696507064332/1513318105533649057/anime-story-2-bizzare-update-public-icon.png?ex=6a274ad0&is=6a25f950&hm=7b8f881b3655bc246ffdb7b605d52e34956004f3c799e28151df27ddc21c10d8&" alt="Anime Story 2 cover">
            </div>

            <div class="script-meta">
              <h2>Anime Story 2</h2>
            </div>
          </div>

          <div id="statusBox" class="status-box online">
            <div class="status-left">
              <span class="dot" aria-hidden="true"></span>
              <div class="status-text">
                <span class="label">สถานะปัจจุบัน</span>
                <span id="statusText" class="value">ใช้งานได้ / ออนไลน์</span>
              </div>
            </div>
            <div id="statusPill" class="status-pill">ONLINE</div>
          </div>
        </section>
      </div> <div class="footer">Made for BlackZ • BlackZOS-UI</div>
    </div>
  </main>

  <script>
    // ====== ปรับสถานะสคริปต์ตรงนี้ง่าย ๆ ======
    const SCRIPT_ONLINE = true; // true = ใช้ได้/ออนไลน์, false = ใช้ไม่ได้/ออฟไลน์

    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const statusPill = document.getElementById('statusPill');

    function applyStatus() {
      if (SCRIPT_ONLINE) {
        statusBox.classList.remove('offline');
        statusBox.classList.add('online');
        statusText.textContent = 'ใช้งานได้ / ออนไลน์';
        statusPill.textContent = 'ONLINE';
      } else {
        statusBox.classList.remove('online');
        statusBox.classList.add('offline');
        statusText.textContent = 'ใช้งานไม่ได้ / ออฟไลน์';
        statusPill.textContent = 'OFFLINE';
      }
    }

    applyStatus();

    // ====== ธีม: light / dark / auto ======
    const root = document.documentElement;
    const buttons = [...document.querySelectorAll('[data-theme-btn]')];
    const storedTheme = localStorage.getItem('blackz-theme') || 'dark';

    function systemTheme() {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function setTheme(theme) {
      const resolved = theme === 'auto' ? systemTheme() : theme;
      root.setAttribute('data-theme', resolved);
      localStorage.setItem('blackz-theme', theme);

      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.themeBtn === theme));
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.themeBtn));
    });

    setTheme(storedTheme);

    // update auto theme if OS theme changes
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
      if ((localStorage.getItem('blackz-theme') || 'dark') === 'auto') setTheme('auto');
    });
  </script>
</body>
</html>
